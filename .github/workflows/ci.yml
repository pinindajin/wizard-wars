name: CI

on:
  pull_request:
    branches: [main, prod]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Run unit tests
        run: bun run test

  integration-fast:
    name: Integration Tests (Fast)
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: test-secret-32-chars-minimum-required
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Run fast integration tests
        run: bun run test:integration:fast

  integration-slow:
    name: Integration Tests (Slow)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ww_user
          POSTGRES_PASSWORD: ww_pass
          POSTGRES_DB: wizardwars
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ww_user:ww_pass@localhost:5433/wizardwars
      AUTH_SECRET: test-secret-32-chars-minimum-required
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Run Prisma migrations
        run: bunx prisma migrate deploy
      - name: Run slow integration tests
        run: bun run test:integration:slow

  e2e:
    name: E2E Tests
    if: github.event_name == 'pull_request' && github.base_ref == 'prod'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ww_user
          POSTGRES_PASSWORD: ww_pass
          POSTGRES_DB: wizardwars
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ww_user:ww_pass@localhost:5432/wizardwars
      AUTH_SECRET: test-secret-32-chars-minimum-required
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Run Prisma migrations
        run: bunx prisma migrate deploy
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-e2e-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-next-e2e-
      - name: Build Next.js app
        run: bun run build
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run E2E tests
        run: bun run test:e2e
      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/
