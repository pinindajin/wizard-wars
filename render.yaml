services:
  - type: web
    name: wizard-wars
    env: node
    plan: starter
    buildCommand: "bun install && bunx prisma migrate deploy && bun run build"
    startCommand: "bun run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wizard-wars-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true

databases:
  - name: wizard-wars-db
    plan: starter
    databaseName: wizardwars
    user: ww_user
